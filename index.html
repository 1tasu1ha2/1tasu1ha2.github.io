<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NIKKORI</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Saira+Stencil+One&family=Orbitron:wght@400;500;700&family=M+PLUS+1+Code:wght@400;500&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1 class="title">NIKKORI</h1>
        </header>

        <main class="tools-grid">
            <div class="tool-box" id="tokenChecker">
                <div class="tool-header">
                    <span class="material-icons tool-icon">verified_user</span>
                    <h2 class="tool-title">Token Checker</h2>
                </div>
                
                <div class="tool-content">
                    <div class="input-grid">
                        <div class="input-group">
                            <label for="tokens">Discord Tokens</label>
                            <textarea id="tokens" placeholder="Enter tokens (one per line)" rows="4"></textarea>
                        </div>
                    </div>
                    
                    <div class="controls">
                        <button id="checkBtn" class="btn btn-start">
                            <span class="material-icons">search</span>
                            Check
                        </button>
                        <button id="copyValidBtn" class="btn btn-copy" disabled>
                            <span class="material-icons">content_copy</span>
                            Copy Valid
                        </button>
                    </div>
                    
                    <div class="results-container">
                        <div class="results-header">
                            <span class="material-icons">account_circle</span>
                            <span>Results</span>
                        </div>
                        <div id="resultsBox" class="results-box"></div>
                    </div>
                </div>
            </div>

            <div class="tool-box" id="godfielder">
                <div class="tool-header">
                    <span class="material-icons tool-icon">flash_on</span>
                    <h2 class="tool-title">Godfielder</h2>
                </div>
                
                <div class="tool-content">
                    <div class="input-grid">
                        <div class="input-group">
                            <label for="name">Name</label>
                            <input type="text" id="name" placeholder="Enter name">
                        </div>
                        
                        <div class="input-group">
                            <label for="room">Room</label>
                            <input type="text" id="room" placeholder="Enter room">
                        </div>
                        
                        <div class="input-group">
                            <label for="message">Message</label>
                            <input type="text" id="message" placeholder="Enter message">
                        </div>
                        
                        <div class="input-group">
                            <label for="botCount">Bot Count</label>
                            <input type="number" id="botCount" min="1" max="12" value="1" placeholder="1-12">
                        </div>
                    </div>
                    
                    <div class="controls">
                        <button id="startBtn" class="btn btn-start">
                            <span class="material-icons">play_arrow</span>
                            Start
                        </button>
                        <button id="stopBtn" class="btn btn-stop" disabled>
                            <span class="material-icons">stop</span>
                            Stop
                        </button>
                    </div>
                    
                    <div class="log-container">
                        <div class="log-header">
                            <span class="material-icons">terminal</span>
                            <span>Logs</span>
                        </div>
                        <div id="logBox" class="log-box"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
