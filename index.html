<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NIKKORI</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Saira+Stencil+One&family=Orbitron:wght@400;500;700&family=M+PLUS+1+Code:wght@400;500&family=Sentiment+Excited&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="title-container">
                <span class="title-decoration">☆</span>
                <h1 class="title">NIKKORI</h1>
                <span class="title-decoration">☆</span>
            </div>
        </header>

        <main class="tools-grid">
            <div class="tool-box">
                <div class="tool-header">
                    <span class="material-icons tool-icon">verified_user</span>
                    <h2 class="tool-title">トークン確認</h2>
                </div>
                
                <div class="tool-content">
                    <div class="input-grid">
                        <div class="input-group">
                            <label for="tokens">
                                トークン
                                <span class="help-icon material-icons" onclick="showHelp('tokens')">help_outline</span>
                            </label>
                            <textarea id="tokens" placeholder="トークンを入力 (改行区切り)" rows="4"></textarea>
                        </div>
                    </div>
                    
                    <div class="controls">
                        <button id="checkBtn" class="btn btn-start">
                            <span class="material-icons">search</span>
                            確認
                        </button>
                        <button id="copyBtn" class="btn btn-copy" disabled>
                            <span class="material-icons">content_copy</span>
                            有効なトークンをコピー
                        </button>
                    </div>
                    
                    <div class="results-container">
                        <div class="results-header">
                            <span class="material-icons">account_circle</span>
                            <span>結果</span>
                        </div>
                        <div id="results" class="results-box"></div>
                    </div>
                </div>
            </div>

            <div class="tool-box">
                <div class="tool-header">
                    <span class="material-icons tool-icon">settings</span>
                    <h2 class="tool-title">設定</h2>
                </div>
                
                <div class="tool-content">
                    <div class="input-grid">
                        <div class="input-group">
                            <label for="cfgTokens">
                                トークン
                                <span class="help-icon material-icons" onclick="showHelp('cfgTokens')">help_outline</span>
                            </label>
                            <textarea id="cfgTokens" placeholder="トークンを入力 (改行区切り)" rows="4"></textarea>
                        </div>
                    </div>

                    <div class="controls">
                        <button id="validateBtn" class="btn btn-start">
                            <span class="material-icons">verified</span>
                            トークン検証
                        </button>
                    </div>

                    <div class="input-grid">
                        <div class="input-group">
                            <label for="serverId">
                                サーバーID
                                <span class="help-icon material-icons" onclick="showHelp('serverId')">help_outline</span>
                            </label>
                            <input type="text" id="serverId" placeholder="サーバーIDを入力">
                        </div>
                        
                        <div class="input-group">
                            <label for="channelIds">
                                チャンネルID
                                <span class="help-icon material-icons" onclick="showHelp('channelIds')">help_outline</span>
                            </label>
                            <textarea id="channelIds" placeholder="チャンネルIDを入力 (改行区切り)" rows="4"></textarea>
                        </div>
                    </div>
                    
                    <div class="controls">
                        <button id="getChannelsBtn" class="btn btn-start">
                            <span class="material-icons">list</span>
                            チャンネル取得
                        </button>
                    </div>
                    
                    <div class="input-grid">
                        <div class="input-group">
                            <label for="mentionIds">
                                メンバーID
                                <span class="help-icon material-icons" onclick="showHelp('mentionIds')">help_outline</span>
                            </label>
                            <textarea id="mentionIds" placeholder="メンバーIDを入力 (改行区切り)" rows="4"></textarea>
                        </div>
                    </div>
                    
                    <div class="controls">
                        <button id="getMentionsBtn" class="btn btn-start">
                            <span class="material-icons">alternate_email</span>
                            メンバー取得
                        </button>
                    </div>
                    
                    <div class="log-container">
                        <div class="log-header">
                            <span class="material-icons">terminal</span>
                            <span>ログ</span>
                        </div>
                        <div id="cfgLog" class="log-box"></div>
                    </div>
                </div>
            </div>

            <div class="tool-box">
                <div class="tool-header">
                    <span class="material-icons tool-icon">group_add</span>
                    <h2 class="tool-title">サーバー</h2>
                </div>
                
                <div class="tool-content">
                    <div class="input-grid">
                        <div class="input-group">
                            <label for="inviteCode">
                                招待コード
                                <span class="help-icon material-icons" onclick="showHelp('inviteCode')">help_outline</span>
                            </label>
                            <input type="text" id="inviteCode" placeholder="招待コードを入力">
                        </div>
                    </div>
                    
                    <div class="controls">
                        <button id="joinBtn" class="btn btn-start">
                            <span class="material-icons">login</span>
                            参加
                        </button>
                        <button id="leaveBtn" class="btn btn-stop">
                            <span class="material-icons">logout</span>
                            退出
                        </button>
                    </div>
                    
                    <div class="log-container">
                        <div class="log-header">
                            <span class="material-icons">terminal</span>
                            <span>ログ</span>
                        </div>
                        <div id="serverLog" class="log-box"></div>
                    </div>
                </div>
            </div>

            <div class="tool-box">
                <div class="tool-header">
                    <span class="material-icons tool-icon">send</span>
                    <h2 class="tool-title">メッセージ送信</h2>
                </div>
                
                <div class="tool-content">
                    <div class="input-grid">
                        <div class="input-group">
                            <label for="msgInput">
                                メッセージ
                                <span class="help-icon material-icons" onclick="showHelp('msgInput')">help_outline</span>
                            </label>
                            <textarea id="msgInput" placeholder="メッセージを入力" rows="4"></textarea>
                        </div>
                    </div>
                    
                    <div class="controls">
                        <button id="addMsgBtn" class="btn btn-start">
                            <span class="material-icons">add</span>
                            追加
                        </button>
                    </div>
                    
                    <div class="results-container message-patterns-container">
                        <div class="results-header">
                            <span class="material-icons">message</span>
                            <span>メッセージパターン</span>
                        </div>
                        <div id="msgPatterns" class="results-box"></div>
                    </div>

                    <div class="input-grid">
                        <div class="input-group">
                            <label for="sendMode">
                                送信方法
                                <span class="help-icon material-icons" onclick="showHelp('sendMode')">help_outline</span>
                            </label>
                            <div class="custom-select" id="sendModeSelect">
                                <div class="select-display">
                                    <span class="select-value">ランダム</span>
                                    <span class="material-icons select-arrow">expand_more</span>
                                </div>
                                <div class="select-options">
                                    <div class="select-option" data-value="random">ランダム</div>
                                    <div class="select-option" data-value="sequential">ローテーション</div>
                                </div>
                            </div>
                        </div>
                        
                        <div class="input-group">
                            <label for="infiniteMode">
                                永久送信
                                <span class="help-icon material-icons" onclick="showHelp('infiniteMode')">help_outline</span>
                            </label>
                            <div class="toggle-container">
                                <input type="checkbox" id="infiniteMode" class="toggle-input">
                                <label for="infiniteMode" class="toggle-label">
                                    <span class="toggle-slider"></span>
                                </label>
                            </div>
                        </div>
                        
                        <div class="input-group" id="countGroup">
                            <label for="msgCount">
                                送信数
                                <span class="help-icon material-icons" onclick="showHelp('msgCount')">help_outline</span>
                            </label>
                            <input type="number" id="msgCount" min="1" value="1" placeholder="送信数を入力">
                        </div>
                        
                        <div class="input-group">
                            <label for="msgInterval">
                                送信間隔 (ms)
                                <span class="help-icon material-icons" onclick="showHelp('msgInterval')">help_outline</span>
                            </label>
                            <input type="number" id="msgInterval" min="100" value="1000" placeholder="送信間隔を入力">
                        </div>
                    </div>
                    
                    <div class="controls">
                        <button id="startSendBtn" class="btn btn-start">
                            <span class="material-icons">play_arrow</span>
                            開始
                        </button>
                        <button id="stopSendBtn" class="btn btn-stop" disabled>
                            <span class="material-icons">stop</span>
                            停止
                        </button>
                    </div>
                    
                    <div class="log-container">
                        <div class="log-header">
                            <span class="material-icons">terminal</span>
                            <span>ログ</span>
                        </div>
                        <div id="sendLog" class="log-box"></div>
                    </div>
                </div>
            </div>

            <div class="tool-box">
                <div class="tool-header">
                    <span class="material-icons tool-icon">flash_on</span>
                    <h2 class="tool-title">Godfield</h2>
                </div>
                
                <div class="tool-content">
                    <div class="input-grid">
                        <div class="input-group">
                            <label for="botName">
                                名前
                                <span class="help-icon material-icons" onclick="showHelp('botName')">help_outline</span>
                            </label>
                            <input type="text" id="botName" placeholder="名前を入力">
                        </div>
                        
                        <div class="input-group">
                            <label for="roomCode">
                                あいことば
                                <span class="help-icon material-icons" onclick="showHelp('roomCode')">help_outline</span>
                            </label>
                            <input type="text" id="roomCode" placeholder="あいことばを入力">
                        </div>
                        
                        <div class="input-group">
                            <label for="botMsg">
                                メッセージ
                                <span class="help-icon material-icons" onclick="showHelp('botMsg')">help_outline</span>
                            </label>
                            <input type="text" id="botMsg" placeholder="メッセージを入力">
                        </div>
                        
                        <div class="input-group">
                            <label for="botCount">
                                ボット数
                                <span class="help-icon material-icons" onclick="showHelp('botCount')">help_outline</span>
                            </label>
                            <input type="number" id="botCount" min="1" max="12" value="1" placeholder="ボット数を入力 1-12">
                        </div>
                    </div>
                    
                    <div class="controls">
                        <button id="startBotBtn" class="btn btn-start">
                            <span class="material-icons">play_arrow</span>
                            開始
                        </button>
                        <button id="stopBotBtn" class="btn btn-stop" disabled>
                            <span class="material-icons">stop</span>
                            停止
                        </button>
                    </div>
                    
                    <div class="log-container">
                        <div class="log-header">
                            <span class="material-icons">terminal</span>
                            <span>ログ</span>
                        </div>
                        <div id="botLog" class="log-box"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="helpModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="helpTitle">ヘルプ</h3>
                <span class="modal-close" onclick="closeHelp()">&times;</span>
            </div>
            <div class="modal-body">
                <p id="helpContent"></p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
