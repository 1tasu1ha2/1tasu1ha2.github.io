<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NIKKORI</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Saira+Stencil+One&family=Orbitron:wght@400;500;700&family=M+PLUS+1+Code:wght@400;500&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1 class="title">NIKKORI</h1>
        </header>

        <main class="tools-grid">
            <div class="tool-box">
                <div class="tool-header">
                    <span class="material-icons tool-icon">verified_user</span>
                    <h2 class="tool-title">Token Checker</h2>
                </div>
                
                <div class="tool-content">
                    <div class="input-grid">
                        <div class="input-group">
                            <label for="tokens">
                                Tokens
                                <span class="help-icon material-icons" onclick="showHelp('tokens')">help_outline</span>
                            </label>
                            <textarea id="tokens" placeholder="Enter Discord tokens (one per line)" rows="4"></textarea>
                        </div>
                    </div>
                    
                    <div class="controls">
                        <button id="checkBtn" class="btn btn-start">
                            <span class="material-icons">search</span>
                            Check
                        </button>
                        <button id="copyValidBtn" class="btn btn-copy" disabled>
                            <span class="material-icons">content_copy</span>
                            Copy Valid
                        </button>
                    </div>
                    
                    <div class="results-container">
                        <div class="results-header">
                            <span class="material-icons">account_circle</span>
                            <span>Results</span>
                        </div>
                        <div id="resultsBox" class="results-box"></div>
                    </div>
                </div>
            </div>

            <div class="tool-box">
                <div class="tool-header">
                    <span class="material-icons tool-icon">settings</span>
                    <h2 class="tool-title">Config</h2>
                </div>
                
                <div class="tool-content">
                    <div class="input-grid">
                        <div class="input-group">
                            <label for="configTokens">
                                Tokens
                                <span class="help-icon material-icons" onclick="showHelp('configTokens')">help_outline</span>
                            </label>
                            <textarea id="configTokens" placeholder="Enter Discord tokens (one per line)" rows="4"></textarea>
                        </div>
                    </div>

                    <div class="controls">
                        <button id="validateBtn" class="btn btn-start">
                            <span class="material-icons">verified</span>
                            Validate Tokens
                        </button>
                    </div>

                    <div class="input-grid">
                        <div class="input-group">
                            <label for="serverId">
                                Server ID
                                <span class="help-icon material-icons" onclick="showHelp('serverId')">help_outline</span>
                            </label>
                            <input type="text" id="serverId" placeholder="Enter Discord server ID">
                        </div>
                        
                        <div class="input-group">
                            <label for="channelIds">
                                Channel IDs
                                <span class="help-icon material-icons" onclick="showHelp('channelIds')">help_outline</span>
                            </label>
                            <textarea id="channelIds" placeholder="Enter channel IDs (one per line)" rows="4"></textarea>
                        </div>
                    </div>
                    
                    <div class="controls">
                        <button id="getChannelsBtn" class="btn btn-start">
                            <span class="material-icons">list</span>
                            Get Channels
                        </button>
                    </div>
                    
                    <div class="input-grid">
                        <div class="input-group">
                            <label for="mentionIds">
                                Mention IDs
                                <span class="help-icon material-icons" onclick="showHelp('mentionIds')">help_outline</span>
                            </label>
                            <textarea id="mentionIds" placeholder="Enter user IDs (one per line)" rows="4"></textarea>
                        </div>
                    </div>
                    
                    <div class="controls">
                        <button id="getMentionsBtn" class="btn btn-start">
                            <span class="material-icons">alternate_email</span>
                            Get Mentions
                        </button>
                    </div>
                    
                    <div class="log-container">
                        <div class="log-header">
                            <span class="material-icons">terminal</span>
                            <span>Logs</span>
                        </div>
                        <div id="configLogs" class="log-box"></div>
                    </div>
                </div>
            </div>

            <div class="tool-box">
                <div class="tool-header">
                    <span class="material-icons tool-icon">dns</span>
                    <h2 class="tool-title">Server</h2>
                </div>
                
                <div class="tool-content">
                    <div class="input-grid">
                        <div class="input-group">
                            <label for="inviteCode">
                                Invite Code
                                <span class="help-icon material-icons" onclick="showHelp('inviteCode')">help_outline</span>
                            </label>
                            <input type="text" id="inviteCode" placeholder="Enter Discord invite code">
                        </div>
                    </div>
                    
                    <div class="controls">
                        <button id="joinBtn" class="btn btn-start">
                            <span class="material-icons">login</span>
                            Join Server
                        </button>
                        <button id="leaveBtn" class="btn btn-stop">
                            <span class="material-icons">logout</span>
                            Leave Server
                        </button>
                    </div>
                    
                    <div class="log-container">
                        <div class="log-header">
                            <span class="material-icons">terminal</span>
                            <span>Logs</span>
                        </div>
                        <div id="serverLogs" class="log-box"></div>
                    </div>
                </div>
            </div>

            <div class="tool-box">
                <div class="tool-header">
                    <span class="material-icons tool-icon">send</span>
                    <h2 class="tool-title">Sender</h2>
                </div>
                
                <div class="tool-content">
                    <div class="input-grid">
                        <div class="input-group">
                            <label for="msgInput">
                                Message
                                <span class="help-icon material-icons" onclick="showHelp('msgInput')">help_outline</span>
                            </label>
                            <textarea id="msgInput" placeholder="Enter message with /rs/, /re/, /rm/ patterns" rows="4"></textarea>
                        </div>
                    </div>
                    
                    <div class="controls">
                        <button id="addMsgBtn" class="btn btn-start">
                            <span class="material-icons">add</span>
                            Add Message
                        </button>
                    </div>
                    
                    <div class="results-container msg-patterns-container">
                        <div class="results-header">
                            <span class="material-icons">message</span>
                            <span>Message Patterns</span>
                        </div>
                        <div id="msgPatterns" class="results-box"></div>
                    </div>

                    <div class="input-grid">
                        <div class="input-group">
                            <label for="sendMode">
                                Send Mode
                                <span class="help-icon material-icons" onclick="showHelp('sendMode')">help_outline</span>
                            </label>
                            <div class="custom-select" id="sendModeSelect">
                                <div class="select-display">
                                    <span class="select-value">Random</span>
                                    <span class="material-icons select-arrow">expand_more</span>
                                </div>
                                <div class="select-options">
                                    <div class="select-option" data-value="random">Random</div>
                                    <div class="select-option" data-value="sequential">Sequential</div>
                                </div>
                            </div>
                        </div>
                        
                        <div class="input-group">
                            <label for="infiniteMode">
                                Infinite Mode
                                <span class="help-icon material-icons" onclick="showHelp('infiniteMode')">help_outline</span>
                            </label>
                            <div class="toggle-container">
                                <input type="checkbox" id="infiniteMode" class="toggle-input">
                                <label for="infiniteMode" class="toggle-label">
                                    <span class="toggle-slider"></span>
                                </label>
                            </div>
                        </div>
                        
                        <div class="input-group" id="countGroup">
                            <label for="msgCount">
                                Count
                                <span class="help-icon material-icons" onclick="showHelp('msgCount')">help_outline</span>
                            </label>
                            <input type="number" id="msgCount" min="1" value="1" placeholder="Number of messages to send">
                        </div>
                        
                        <div class="input-group">
                            <label for="msgInterval">
                                Interval (ms)
                                <span class="help-icon material-icons" onclick="showHelp('msgInterval')">help_outline</span>
                            </label>
                            <input type="number" id="msgInterval" min="1" value="1000" placeholder="Interval between messages">
                        </div>
                    </div>
                    
                    <div class="controls">
                        <button id="startSendBtn" class="btn btn-start">
                            <span class="material-icons">play_arrow</span>
                            Start
                        </button>
                        <button id="stopSendBtn" class="btn btn-stop" disabled>
                            <span class="material-icons">stop</span>
                            Stop
                        </button>
                    </div>
                    
                    <div class="log-container">
                        <div class="log-header">
                            <span class="material-icons">terminal</span>
                            <span>Logs</span>
                        </div>
                        <div id="senderLogs" class="log-box"></div>
                    </div>
                </div>
            </div>

            <div class="tool-box">
                <div class="tool-header">
                    <span class="material-icons tool-icon">flash_on</span>
                    <h2 class="tool-title">Godfielder</h2>
                </div>
                
                <div class="tool-content">
                    <div class="input-grid">
                        <div class="input-group">
                            <label for="botName">
                                Name
                                <span class="help-icon material-icons" onclick="showHelp('botName')">help_outline</span>
                            </label>
                            <input type="text" id="botName" placeholder="Enter bot name with /rs/, /re/ patterns">
                        </div>
                        
                        <div class="input-group">
                            <label for="roomCode">
                                Room
                                <span class="help-icon material-icons" onclick="showHelp('roomCode')">help_outline</span>
                            </label>
                            <input type="text" id="roomCode" placeholder="Enter room password">
                        </div>
                        
                        <div class="input-group">
                            <label for="botMsg">
                                Message
                                <span class="help-icon material-icons" onclick="showHelp('botMsg')">help_outline</span>
                            </label>
                            <input type="text" id="botMsg" placeholder="Enter message with /rs/, /re/ patterns">
                        </div>
                        
                        <div class="input-group">
                            <label for="botCount">
                                Bot Count
                                <span class="help-icon material-icons" onclick="showHelp('botCount')">help_outline</span>
                            </label>
                            <input type="number" id="botCount" min="1" max="12" value="1" placeholder="Number of bots (1-12)">
                        </div>
                    </div>
                    
                    <div class="controls">
                        <button id="startBotsBtn" class="btn btn-start">
                            <span class="material-icons">play_arrow</span>
                            Start
                        </button>
                        <button id="stopBotsBtn" class="btn btn-stop" disabled>
                            <span class="material-icons">stop</span>
                            Stop
                        </button>
                    </div>
                    
                    <div class="log-container">
                        <div class="log-header">
                            <span class="material-icons">terminal</span>
                            <span>Logs</span>
                        </div>
                        <div id="godfielderLogs" class="log-box"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="helpModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="helpTitle">Help</h3>
                <span class="modal-close" onclick="closeHelp()">&times;</span>
            </div>
            <div class="modal-body">
                <p id="helpContent"></p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
