<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NIKKORI</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Saira+Stencil+One&family=Orbitron:wght@400;500;700&family=M+PLUS+1+Code:wght@400;500&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1 class="title">NIKKORI</h1>
        </header>

        <main class="tools-grid" id="toolsGrid">
            <div class="tool-box" id="tokenChecker">
                <div class="tool-header">
                    <span class="material-icons tool-icon">verified_user</span>
                    <h2 class="tool-title">Token Checker</h2>
                </div>
                
                <div class="tool-content">
                    <div class="input-grid">
                        <div class="input-group">
                            <label for="tokens">
                                Tokens
                                <span class="help-icon material-icons" onclick="showHelp('tokens')">help_outline</span>
                            </label>
                            <textarea id="tokens" placeholder="Enter tokens (one per line)" rows="4"></textarea>
                        </div>
                    </div>
                    
                    <div class="controls">
                        <button id="checkBtn" class="btn btn-start">
                            <span class="material-icons">search</span>
                            Check
                        </button>
                        <button id="copyValidBtn" class="btn btn-copy" disabled>
                            <span class="material-icons">content_copy</span>
                            Copy Valid
                        </button>
                    </div>
                    
                    <div class="results-container">
                        <div class="results-header">
                            <span class="material-icons">account_circle</span>
                            <span>Results</span>
                        </div>
                        <div id="resultsBox" class="results-box"></div>
                    </div>
                </div>
            </div>

            <div class="tool-box" id="config">
                <div class="tool-header">
                    <span class="material-icons tool-icon">settings</span>
                    <h2 class="tool-title">Config</h2>
                </div>
                
                <div class="tool-content">
                    <div class="input-grid">
                        <div class="input-group">
                            <label for="configTokens">
                                Tokens
                                <span class="help-icon material-icons" onclick="showHelp('configTokens')">help_outline</span>
                            </label>
                            <textarea id="configTokens" placeholder="Enter tokens (one per line)" rows="4"></textarea>
                        </div>
                    </div>

                    <div class="controls">
                        <button id="validateTokensBtn" class="btn btn-start">
                            <span class="material-icons">verified</span>
                            Validate Tokens
                        </button>
                    </div>

                    <div class="input-grid">
                        <div class="input-group">
                            <label for="serverId">
                                Server ID
                                <span class="help-icon material-icons" onclick="showHelp('serverId')">help_outline</span>
                            </label>
                            <input type="text" id="serverId" placeholder="Enter server ID">
                        </div>
                        
                        <div class="input-group">
                            <label for="channelIds">
                                Channel IDs
                                <span class="help-icon material-icons" onclick="showHelp('channelIds')">help_outline</span>
                            </label>
                            <textarea id="channelIds" placeholder="Enter channel IDs (one per line)" rows="4"></textarea>
                        </div>
                    </div>
                    
                    <div class="controls">
                        <button id="fetchChannelsBtn" class="btn btn-start">
                            <span class="material-icons">list</span>
                            Get Channels
                        </button>
                    </div>
                    
                    <div class="input-grid">
                        <div class="input-group">
                            <label for="mentionIds">
                                Mention IDs
                                <span class="help-icon material-icons" onclick="showHelp('mentionIds')">help_outline</span>
                            </label>
                            <textarea id="mentionIds" placeholder="Enter mention IDs (one per line)" rows="4"></textarea>
                        </div>
                    </div>
                    
                    <div class="controls">
                        <button id="fetchMentionsBtn" class="btn btn-start">
                            <span class="material-icons">alternate_email</span>
                            Get Mentions
                        </button>
                    </div>
                    
                    <div class="log-container">
                        <div class="log-header">
                            <span class="material-icons">terminal</span>
                            <span>Logs</span>
                        </div>
                        <div id="configLogBox" class="log-box"></div>
                    </div>
                </div>
            </div>

            <div class="tool-box" id="sender">
                <div class="tool-header">
                    <span class="material-icons tool-icon">send</span>
                    <h2 class="tool-title">Sender</h2>
                </div>
                
                <div class="tool-content">
                    <div class="input-grid">
                        <div class="input-group">
                            <label for="messageInput">
                                Message
                                <span class="help-icon material-icons" onclick="showHelp('messageInput')">help_outline</span>
                            </label>
                            <textarea id="messageInput" placeholder="Enter message" rows="4"></textarea>
                        </div>
                    </div>
                    
                    <div class="controls">
                        <button id="addMessageBtn" class="btn btn-start">
                            <span class="material-icons">add</span>
                            Add Message
                        </button>
                    </div>
                    
                    <div class="results-container message-patterns-container">
                        <div class="results-header">
                            <span class="material-icons">message</span>
                            <span>Message Patterns</span>
                        </div>
                        <div id="messagePatterns" class="results-box"></div>
                    </div>

                    <div class="input-grid">
                        <div class="input-group">
                            <label for="sendMode">
                                Send Mode
                                <span class="help-icon material-icons" onclick="showHelp('sendMode')">help_outline</span>
                            </label>
                            <div class="custom-select" id="sendModeSelect">
                                <div class="select-display">
                                    <span class="select-value">Random</span>
                                    <span class="material-icons select-arrow">expand_more</span>
                                </div>
                                <div class="select-options">
                                    <div class="select-option" data-value="random">Random</div>
                                    <div class="select-option" data-value="sequential">Sequential</div>
                                </div>
                            </div>
                        </div>
                        
                        <div class="input-group">
                            <label for="infiniteToggle">
                                Infinite Mode
                                <span class="help-icon material-icons" onclick="showHelp('infiniteToggle')">help_outline</span>
                            </label>
                            <div class="toggle-container">
                                <input type="checkbox" id="infiniteToggle" class="toggle-input">
                                <label for="infiniteToggle" class="toggle-label">
                                    <span class="toggle-slider"></span>
                                </label>
                            </div>
                        </div>
                        
                        <div class="input-group" id="countGroup">
                            <label for="messageCount">
                                Count
                                <span class="help-icon material-icons" onclick="showHelp('messageCount')">help_outline</span>
                            </label>
                            <input type="number" id="messageCount" min="1" value="1" placeholder="Enter count">
                        </div>
                        
                        <div class="input-group">
                            <label for="messageInterval">
                                Interval (ms)
                                <span class="help-icon material-icons" onclick="showHelp('messageInterval')">help_outline</span>
                            </label>
                            <input type="number" id="messageInterval" min="100" value="1000" placeholder="Enter interval">
                        </div>
                    </div>
                    
                    <div class="controls">
                        <button id="startSendBtn" class="btn btn-start">
                            <span class="material-icons">play_arrow</span>
                            Start
                        </button>
                        <button id="stopSendBtn" class="btn btn-stop" disabled>
                            <span class="material-icons">stop</span>
                            Stop
                        </button>
                    </div>
                    
                    <div class="log-container">
                        <div class="log-header">
                            <span class="material-icons">terminal</span>
                            <span>Logs</span>
                        </div>
                        <div id="senderLogBox" class="log-box"></div>
                    </div>
                </div>
            </div>

            <div class="tool-box" id="godfielder">
                <div class="tool-header">
                    <span class="material-icons tool-icon">flash_on</span>
                    <h2 class="tool-title">Godfielder</h2>
                </div>
                
                <div class="tool-content">
                    <div class="input-grid">
                        <div class="input-group">
                            <label for="name">
                                Name
                                <span class="help-icon material-icons" onclick="showHelp('name')">help_outline</span>
                            </label>
                            <input type="text" id="name" placeholder="Enter name">
                        </div>
                        
                        <div class="input-group">
                            <label for="room">
                                Room
                                <span class="help-icon material-icons" onclick="showHelp('room')">help_outline</span>
                            </label>
                            <input type="text" id="room" placeholder="Enter room">
                        </div>
                        
                        <div class="input-group">
                            <label for="message">
                                Message
                                <span class="help-icon material-icons" onclick="showHelp('message')">help_outline</span>
                            </label>
                            <input type="text" id="message" placeholder="Enter message">
                        </div>
                        
                        <div class="input-group">
                            <label for="botCount">
                                Bot Count
                                <span class="help-icon material-icons" onclick="showHelp('botCount')">help_outline</span>
                            </label>
                            <input type="number" id="botCount" min="1" max="12" value="1" placeholder="Enter bot count 1-12">
                        </div>
                    </div>
                    
                    <div class="controls">
                        <button id="startBtn" class="btn btn-start">
                            <span class="material-icons">play_arrow</span>
                            Start
                        </button>
                        <button id="stopBtn" class="btn btn-stop" disabled>
                            <span class="material-icons">stop</span>
                            Stop
                        </button>
                    </div>
                    
                    <div class="log-container">
                        <div class="log-header">
                            <span class="material-icons">terminal</span>
                            <span>Logs</span>
                        </div>
                        <div id="logBox" class="log-box"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="helpModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="helpTitle">Help</h3>
                <span class="modal-close" onclick="closeHelp()">&times;</span>
            </div>
            <div class="modal-body">
                <p id="helpContent"></p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
